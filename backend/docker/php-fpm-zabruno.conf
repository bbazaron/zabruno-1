; Грузится после zz-docker.conf. При master от non-root (gosu laravel) лог в stderr падает с Permission denied.
[global]
error_log = /var/www/storage/logs/php-fpm-error.log

[www]
user = laravel
group = laravel
; Иначе та же ошибка, что у error_log: non-root не может писать в /proc/self/fd/2
access.log = /var/www/storage/logs/php-fpm-access.log
