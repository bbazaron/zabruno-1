server {
    listen 80;
    server_name agaforma.ru www.agaforma.ru localhost;

    root /var/www/frontend/dist;
    index index.html;

    client_max_body_size 64m;

    # Запросы с хостового nginx приходят с X-Forwarded-* — подставляем реальный клиент в логи/$_SERVER
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    location / {
        try_files $uri /index.html;
    }

    # Laravel API: PHP только в контейнере backend (не try_files к index.php в nginx)
    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }

    # Публичные файлы Laravel storage (загруженные изображения товаров)
    location ^~ /storage/ {
        alias /var/www/backend/storage/app/public/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
